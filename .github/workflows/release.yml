name: Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

env:
  CARGO_TERM_COLOR: always

# Required for the GITHUB_TOKEN to create releases and upload assets.
permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    # Created as a draft so a release is never visible without its binaries.
    # The publish-release job flips it once every asset has uploaded.
    - name: Create draft release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ github.ref_name }}" \
          --draft \
          --title "${{ github.ref_name }}" \
          --generate-notes

  build:
    name: Build ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each target builds on its own native runner. Adding a target to the
          # toolchain does not supply a cross-linker, so building the macOS and
          # Windows targets on Ubuntu could never have worked.
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
    - uses: actions/checkout@v5

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Build
      run: cargo build --release --locked --target ${{ matrix.target }}

    - name: Package
      shell: bash
      run: |
        staging="vina-${{ github.ref_name }}-${{ matrix.name }}"
        mkdir -p "$staging"
        cp README.md LICENSE "$staging/"

        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          cp "target/${{ matrix.target }}/release/vina.exe" "$staging/"
          7z a "$staging.zip" "$staging"
          echo "ASSET=$staging.zip" >> "$GITHUB_ENV"
        else
          cp "target/${{ matrix.target }}/release/vina" "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"
        fi

    - name: Upload asset
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release upload "${{ github.ref_name }}" "$ASSET" --clobber

  publish-release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Undraft release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release edit "${{ github.ref_name }}" --draft=false

  publish-crate:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Publish to crates.io
      # The token goes through the environment rather than `--token` so it does
      # not land in the process list. The `secrets` context is not available in
      # a job-level `if`, so the "is this configured" check has to happen here.
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      run: |
        if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
          echo "CARGO_REGISTRY_TOKEN is not set; skipping the crates.io publish."
          echo "The GitHub release itself is unaffected."
          exit 0
        fi
        cargo publish --locked
